<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — NOWPDP Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var _supabaseUrl = 'https://pnhgtpezsuegqqkyvxhf.supabase.co';
  var _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuaGd0cGV6c3VlZ3Fxa3l2eGhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk5MTEsImV4cCI6MjA5MTA0NTkxMX0.BnztnU1eFRhjLG4wvaFXrIHhf4-vyDTgQP-8d-MkbG4';
  var _sbClient = null;
  function initSupabase() {
    if (window.supabase && _supabaseUrl !== 'YOUR_SUPABASE_URL') {
      _sbClient = window.supabase.createClient(_supabaseUrl, _supabaseKey);
    }
  }
  document.addEventListener('DOMContentLoaded', initSupabase);
</script>
<style>
:root {
  --blue: #1a56db; --blue-dark: #1045b8; --blue-light: #eff4ff;
  --orange: #f97316; --ink: #0f172a;
  --soft: #64748b; --border: #e2e8f0; --white: #ffffff;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background: var(--ink);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  position: relative; overflow: hidden;
}
body::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 40%, rgba(26,86,219,.3) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 60%, rgba(249,115,22,.18) 0%, transparent 55%);
}
.card {
  background: var(--white);
  border-radius: 24px;
  padding: 52px 48px;
  width: 440px; max-width: 100%;
  position: relative; z-index: 2;
  box-shadow: 0 32px 80px rgba(0,0,0,.4);
}
.card-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
.logo-mark {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--blue), #3b82f6);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 24px; }
.logo-text strong {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700; color: var(--ink);
  display: block; line-height: 1.2;
}
.logo-text span {
  font-size: 11px; font-weight: 400;
  color: var(--soft); text-transform: uppercase; letter-spacing: .08em;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; font-weight: 700; color: var(--ink);
  margin-bottom: 6px;
}
.sub { font-size: 14px; color: var(--soft); margin-bottom: 36px; font-weight: 300; }

.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
.field label { font-size: 13px; font-weight: 600; color: #334155; }
.field input {
  padding: 14px 18px;
  border: 2px solid var(--border);
  border-radius: 11px;
  font-size: 15px; font-family: 'DM Sans', sans-serif;
  color: var(--ink); outline: none; transition: .2s;
}
.field input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(26,86,219,.08);
}
.err-msg {
  background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 10px; padding: 12px 16px;
  font-size: 13px; font-weight: 500; color: #dc2626;
  margin-bottom: 16px; display: none; align-items: center; gap: 8px;
}
.err-msg.show { display: flex; }

.btn-login {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--blue), #3b82f6);
  color: white; border: none; border-radius: 100px;
  font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: .2s; margin-top: 4px;
  box-shadow: 0 6px 20px rgba(26,86,219,.35);
}
.btn-login:hover { opacity: .9; }

.card-footer {
  margin-top: 28px; padding-top: 22px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.card-footer a { font-size: 13px; color: var(--soft); text-decoration: none; transition: .2s; }
.card-footer a:hover { color: var(--blue); }
</style>
</head>
<body>
<div class="card">
  <div class="card-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="7" r="3" fill="white" opacity=".9"/>
        <path d="M5 20c0-4 3-7 7-7s7 3 7 7" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-text">
      <strong>NOWPDP</strong>
      <span>Admin Portal</span>
    </div>
  </div>

  <h1>Sign In</h1>
  <p class="sub">Access the survey analytics dashboard.</p>

  <div class="field">
    <label>Username</label>
    <input type="text" id="usr" placeholder="Enter username"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="••••••••••" onkeydown="if(event.key==='Enter')login()"/>
  </div>

  <div class="err-msg" id="err">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#dc2626" stroke-width="1.4"/><path d="M7.5 4v4M7.5 10.5v.2" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/></svg>
    Incorrect username or password.
  </div>

  <button class="btn-login" onclick="login()">Sign In →</button>

  <div class="card-footer">
    <a href="index.html">← Back to Survey</a>
  </div>
</div>

<script>
async function login() {
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  const btn = document.querySelector('.btn-login');
  err.classList.remove('show');

  if (!usr || !pwd) {
    err.innerHTML = '<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#dc2626" stroke-width="1.4"/><path d="M7.5 4v4M7.5 10.5v.2" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/></svg> Please enter username and password.';
    err.classList.add('show'); return;
  }
  if (!_sbClient) {
    err.innerHTML = '<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#dc2626" stroke-width="1.4"/><path d="M7.5 4v4M7.5 10.5v.2" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/></svg> Supabase not configured yet.';
    err.classList.add('show'); return;
  }

  btn.disabled = true; btn.textContent = 'Signing in...';
  const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), ms));
  try {
    const { data, error } = await Promise.race([
      _sbClient.from('admins').select('*').eq('username', usr).eq('password', pwd).single(),
      timeout(10000)
    ]);
    if (data) {
      sessionStorage.setItem('admin-ok', '1');
      window.location.href = 'dashboard.html';
    } else {
      err.classList.add('show');
    }
  } catch(e) {
    err.innerHTML = '<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#dc2626" stroke-width="1.4"/><path d="M7.5 4v4M7.5 10.5v.2" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/></svg> Connection error. Please try again.';
    err.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Sign In →';
}
</script>
</body>
</html>
